name: CI Pipeline - Notes App

on:
  push:
    branches: [ sesi31-loadtest, main ]
  pull_request:
    branches: [ sesi31-loadtest, main ]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
          cache: 'npm'
      - run: npm install
      - name: Run ESLint
        run: npm run lint

  unit-test:
    needs: lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'
      - run: npm install
      - name: Run Jest Unit Test
        run: npm test -- --coverage

  sonarqube:
    needs: unit-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: SonarQube Cloud Scan
        uses: sonarsource/sonarcloud-github-action@v3.0.0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  k6-test:
    needs: unit-test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      # 1. Setup Node.js (Sesuaikan versinya dengan aplikasi Anda)
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 2. Install dependensi aplikasi Anda
      - name: Install Application Dependencies
        run: npm install

      # 3. Jalankan aplikasi di background (Wajib pakai tanda &)
      - name: Start Application Server
        run: npm start &

      # 4. Beri jeda beberapa detik agar server benar-benar siap
      - name: Wait for Server to be Ready
        run: sleep 5

      # 5. Setup k6 seperti biasa
      - name: Setup k6
        uses: grafana/setup-k6-action@v1

      # 6. Jalankan k6 Smoke Test
      - name: Run k6 Smoke Test
        run: k6 run loadtest/script.js
